name: github-release

on:
  workflow_dispatch:
    inputs:
      version:
        default: "auto"
        description: Can be used to set a specific version. Use 'auto' for automatic version calculation
        type: string

jobs:
  release:
    uses: wittdennis/pipelines/.github/workflows/cog-release.yaml@22455dee9e3a2ddc3d135315a7808c4754a6d312 # 2.0.16
    with:
      version: ${{ inputs.version }}
    secrets:
      release-token: ${{ secrets.RELEASE_TOKEN }}
